services:
  kafka:
    image: apache/kafka:4.1.0
    container_name: streambridge-kafka
    ports:
      - "19092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 8

  kafka-init:
    image: apache/kafka:4.1.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic file-transfer-metadata --partitions 3 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic file-transfer-chunks --partitions 6 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic file-transfer-events --partitions 3 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic file-transfer-metrics --partitions 3 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list;
      "

  api:
    image: node:22-bullseye
    working_dir: /workspace
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ../../:/workspace
    command: sh -c "npm run --workspace @streambridge/api dev"
    environment:
      API_PORT: 4000
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: streambridge-api
      DATA_DIR: /workspace/apps/api/data
      UPLOAD_DIR: /workspace/apps/api/uploads
    ports:
      - "4000:4000"

  worker:
    image: node:22-bullseye
    working_dir: /workspace
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ../../:/workspace
    command: sh -c "npm run --workspace @streambridge/worker dev"
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: streambridge-worker
      DATA_DIR: /workspace/apps/api/data

  analytics:
    image: node:22-bullseye
    working_dir: /workspace
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ../../:/workspace
    command: sh -c "npm run --workspace @streambridge/analytics dev"
    environment:
      ANALYTICS_PORT: 4100
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: streambridge-analytics
    ports:
      - "4100:4100"

  web:
    image: node:22-bullseye
    working_dir: /workspace
    depends_on:
      - api
    volumes:
      - ../../:/workspace
    command: sh -c "npm run --workspace @streambridge/web dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE: http://localhost:4000
      WEB_PORT: 5173
    ports:
      - "5173:5173"
